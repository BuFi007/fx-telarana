[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
# Auto-detect: project files pin ^0.8.26, vendored Morpho pins 0.8.19 strictly.
# With auto_detect_solc, Foundry downloads each version on demand via svm.
auto_detect_solc = true
# Arc targets the Prague hardfork (superset of Cancun), so Cancun opcodes (mcopy,
# transient storage) are safe. RedStone's evm-connector library uses `mcopy`,
# which requires Cancun+. The Circle SCP `evmVersion: "paris"` advice applies to
# their bytecode-upload deploy path, not to direct RPC deploys or contract
# imports — which is what we use.
evm_version = "cancun"
optimizer = true
# Lowered from 1_000_000 to fit FxSwapHook under EIP-170 (24,576 bytes
# deployed bytecode). High `runs` optimizes for runtime gas at the
# expense of code size; 200 biases toward deploy cost. With via_ir,
# this lops several KB off FxSwapHook without changing any logic.
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
# Raised from the foundry default 1e9 — the avalanche-basket matrix test
# deploys 5 FxSwapHook instances + Morpho markets in a single tx, which
# tips past the cap once DODO PMM math inlines into the hook bytecode.
gas_limit = 9_223_372_036_854_775_807
fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read-write", path = "../deployments" },
  { access = "read", path = "./out" },
]

remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
  "@redstone-finance/evm-connector/=lib/redstone-oracles-monorepo/packages/evm-connector/contracts/",
  "redstone-mocks/=lib/redstone-oracles-monorepo/packages/evm-connector/contracts/mocks/",
  "morpho-blue/=lib/morpho-blue/src/",
  "@uniswap/v4-core/=lib/v4-core/",
  "@uniswap/v4-periphery/=lib/v4-periphery/",
  "cctp-v2/=lib/evm-cctp-contracts/src/v2/",
  "dodo-pmm/=lib/dodo-pmm-08/",
  "privacy-pools/=lib/privacy-pools/",
  "interfaces/=lib/privacy-pools/interfaces/",
  "@oz/=lib/openzeppelin-contracts/contracts/",
  "@oz-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "poseidon/=lib/poseidon-solidity/",
  "lean-imt/=lib/lean-imt/",
]

[profile.default.fuzz]
runs = 256

[profile.ci.fuzz]
runs = 10_000

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC}"
ethereum = "${ETHEREUM_RPC}"
base = "${BASE_RPC}"

[etherscan]
arc_testnet = { key = "${ARCSCAN_KEY}", url = "${ARCSCAN_URL}" }
